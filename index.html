<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff4d6d, #ff99ac);
    color: white;
    text-align: center;

    /* ✅ scrolling enabled */
    overflow-x: hidden;
    overflow-y: auto;
    min-height: 100vh;
}

/* Loading screen */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #ff4d6d;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

/* Login box */
.container {
    margin-top: 12%;
}

/* Inputs */
input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align: center;
}

/* Buttons */
button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    background: white;
    color: #ff4d6d;
    border-radius: 20px;
    cursor: pointer;
}

/* Main content hidden */
#mainContent {
    display: none;
}

/* Card */
.card {
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 20px;
    display: inline-block;
    margin-top: 40px;
    backdrop-filter: blur(6px);
}

/* Typing text */
#text {
    font-size: 20px;
    margin-top: 10px;
}

/* Images */
img {
    margin-top: 15px;
    width: 200px;
    border-radius: 15px;
}

/* Hearts */
.heart {
    position: absolute;
    bottom: -10px;
    font-size: 18px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(0); opacity: 1;}
    100% {transform: translateY(-110vh); opacity: 0;}
}

/* Burst hearts */
.burst {
    position: absolute;
    font-size: 20px;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% {transform: scale(0); opacity: 1;}
    100% {transform: scale(3) translateY(-50px); opacity: 0;}
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loading">
    <h2>Loading love message 💖</h2>
</div>

<!-- PASSWORD SCREEN -->
<div class="container" id="login">
    <h2>Enter Password 💌</h2>
    <input type="password" id="password" placeholder="Hint: something special 😉">
    <br>
    <button onclick="checkPassword()">Unlock ❤️</button>
    <p id="error" style="display:none;">Wrong password 😢</p>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">

    <!-- 🎵 MUSIC (FIXED) -->
    <iframe id="music"
        width="0"
        height="0"
        src=""
        allow="autoplay">
    </iframe>

    <div class="card">
        <h1>Hey Babe ❤️</h1>
        <div id="text"></div>

        <button onclick="reveal()">Open surprise 💌</button>

        <div id="message" style="display:none;">

            <img src="Snapchat-1419540722.jpg"><br>
            I love you sooo much 💖<br>
            You’re my favorite person 🥺<br>
            I can’t wait to hug you again 🤍<br>
            I owe you something special 😏<br>

            <img src="c6d49916265868b4f08ff0b4ce387e42.jpg" width="200"><br>

            MOMMY LOVES YOU SO MUCH 💕<br><br>

            <img src="IMG_20260322_182834.jpg">

        </div>
    </div>

</div>

<script>

const correctPassword = "reagan_lyan";

/* Loading screen */
setTimeout(() => {
    document.getElementById("loading").style.display = "none";
}, 2000);

/* Password check */
function checkPassword() {
    const userInput = document.getElementById("password").value;

    if (userInput === correctPassword) {

        document.getElementById("login").style.display = "none";
        document.getElementById("mainContent").style.display = "block";

        // 🎵 START MUSIC (Perfect - Ed Sheeran)
        document.getElementById("music").src =
        "https://www.youtube.com/embed/2Vv-BfVoq4g?autoplay=1&loop=1&playlist=2Vv-BfVoq4g";

        startTyping();
        heartBurst();

    } else {
        document.getElementById("error").style.display = "block";
    }
}

/* Typing effect */
const messageText = "You make my world brighter every single day ☀️💖";
let i = 0;

function startTyping() {
    function type() {
        if (i < messageText.length) {
            document.getElementById("text").innerHTML += messageText.charAt(i);
            i++;
            setTimeout(type, 50);
        }
    }
    type();
}

/* Reveal message */
function reveal() {
    document.getElementById("message").style.display = "block";
}

/* Floating hearts */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

/* Burst hearts */
function heartBurst() {
    for (let i = 0; i < 25; i++) {
        const heart = document.createElement("div");
        heart.classList.add("burst");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "50%";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 1000);
    }
}
  
</script>

</body>
</html>
